name: Predeploy

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  release-check:
    name: Typecheck, test, build, production audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Production dependency audit
        run: npm run audit:prod
